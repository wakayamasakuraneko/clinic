<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="4;url=https://wakayamasakuraneko.com/">
  <title>移転のお知らせ｜和歌山スペイクリニック</title>
  <style>
    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f6f4a5;
      font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      color: #5a4a1a;
    }
    .box {
      text-align: center;
      padding: 2em 1.5em;
      max-width: 480px;
    }
    h1 {
      font-size: 1.3rem;
      margin: 0 0 1em;
      font-weight: bold;
    }
    p {
      font-size: 1rem;
      line-height: 1.8;
      margin: 0 0 1.5em;
    }
    a {
      display: inline-block;
      background: #5a4a1a;
      color: #f6f4a5;
      text-decoration: none;
      padding: 0.6em 1.8em;
      border-radius: 2em;
      font-size: 1rem;
    }
    a:hover { background: #886c34; }
    .note {
      margin-top: 1.2em;
      font-size: 0.8rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>ページが移転しました</h1>
    <p>
      和歌山スペイクリニックのホームページは<br>
      新しいアドレスに移転しました。<br>
      ブックマークの更新をお願いします。
    </p>
    <a href="https://wakayamasakuraneko.com/">新しいページへ</a>
    <p class="note">自動的に移動します（4秒後）</p>
  </div>
</body>
</html>
